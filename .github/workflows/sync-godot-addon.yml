name: Sync Godot Addon to Sample

on:
  push:
    branches: [main]
    paths: [Godot/**]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Copy addon to Godot sample
        run: bash ./scripts/sync-godot-sample.sh

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Samples/PolyPetDemoGodot/addons/PolyPet/
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: sync Godot addon to sample project"
          git pull --rebase origin main
          git push origin HEAD:main
