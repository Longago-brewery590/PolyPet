name: Sync Unity Package to Sample

on:
  push:
    branches: [main]
    paths: [Unity/**]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: polypet-main-writers
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Copy package to Unity sample
        run: ./scripts/sync-unity-sample.sh

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Samples/PolyPetDemoUnity/Packages/com.shilo.polypet/
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: sync Unity package to sample project"
          git pull --rebase origin main
          git push origin HEAD:main
