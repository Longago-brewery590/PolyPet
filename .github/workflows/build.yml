name: Build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  godot-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2.4.1
        with:
          version: 4.6.0-stable
          use-dotnet: true
          include-templates: true

      - name: Restore .NET dependencies
        run: dotnet restore Samples/PolyPetDemoGodot/PolyPetDemoGodot.csproj

      - name: Build .NET project
        run: dotnet build Samples/PolyPetDemoGodot/PolyPetDemoGodot.csproj --configuration Release --no-restore

      - name: Export Godot project for Windows
        run: |
          mkdir -p Samples/PolyPetDemoGodot/build
          godot --headless --path Samples/PolyPetDemoGodot --export-release "Windows Desktop"

      - name: Zip build output
        run: |
          cd Samples/PolyPetDemoGodot/build
          zip -r ../../../PolyPetDemo-Windows-${{ inputs.version }}.zip .

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ inputs.tag }} \
            PolyPetDemo-Windows-${{ inputs.version }}.zip
