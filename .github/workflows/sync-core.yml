name: Sync Core

on:
  push:
    branches: [main]
    paths: [Core/**]

permissions:
  contents: write

concurrency:
  group: polypet-sync-core-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Sync and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            bash ./scripts/sync-core-to-adapters.sh
            bash ./scripts/sync-godot-sample.sh
            bash ./scripts/sync-unity-sample.sh

            git add -f Godot/addons/PolyPet/Core/ Unity/Runtime/Core/
            git add -f Samples/PolyPetDemoGodot/addons/PolyPet/ Samples/PolyPetDemoUnity/Packages/com.shilo.polypet/
            if git diff --cached --quiet; then
              exit 0
            fi

            git commit -m "chore(core): sync Core to engine adapters and samples"
            if git push origin HEAD:main; then
              exit 0
            fi
          done

          echo "::error::Failed to push synced Core changes after 3 attempts."
          exit 1
