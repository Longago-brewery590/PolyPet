name: Sync Core

on:
  push:
    branches: [main]
    paths: [Core/**]

permissions:
  actions: write
  contents: write

concurrency:
  group: polypet-main-writers
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync Core to engine adapters
        run: ./scripts/sync-core-to-adapters.sh

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Godot/addons/PolyPet/Core/ Unity/Runtime/Core/
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(core): sync Core to engine adapters"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Trigger sample sync workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run sync-unity-package.yml
          gh workflow run sync-godot-addon.yml
