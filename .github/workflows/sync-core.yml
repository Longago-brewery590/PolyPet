name: Sync Core

on:
  push:
    branches: [main]
    paths: [Core/**]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Copy Core to Godot
        run: |
          rm -rf Godot/addons/PolyPet/Core
          mkdir -p Godot/addons/PolyPet/Core
          cp Core/*.cs Godot/addons/PolyPet/Core/

      - name: Copy Core to Unity
        run: |
          rm -rf Unity/Runtime/Core
          mkdir -p Unity/Runtime/Core
          cp Core/*.cs Unity/Runtime/Core/

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Godot/addons/PolyPet/Core/ Unity/Runtime/Core/
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(core): sync Core to engine adapters"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Trigger sample sync workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run sync-unity-package.yml
          gh workflow run sync-godot-addon.yml
