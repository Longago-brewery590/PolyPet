name: Sync Core

on:
  push:
    branches: [main]
    paths: [Core/**]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Copy Core to Godot
        run: |
          rm -rf Godot/addons/PolyPet/Core
          mkdir -p Godot/addons/PolyPet/Core
          cp Core/*.cs Godot/addons/PolyPet/Core/

      - name: Copy Core to Unity
        run: |
          rm -rf Unity/Runtime/Core
          mkdir -p Unity/Runtime/Core
          cp Core/*.cs Unity/Runtime/Core/

      - name: Copy addon to Godot sample
        run: |
          rm -rf Samples/PolyPetDemoGodot/addons/PolyPet
          mkdir -p Samples/PolyPetDemoGodot/addons
          cp -r Godot/addons/PolyPet Samples/PolyPetDemoGodot/addons/PolyPet

      - name: Copy package to Unity sample
        run: |
          rm -rf Samples/PolyPetDemoUnity/Packages/com.shilo.polypet
          mkdir -p Samples/PolyPetDemoUnity/Packages
          cp -r Unity Samples/PolyPetDemoUnity/Packages/com.shilo.polypet

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Godot/addons/PolyPet/Core/ Unity/Runtime/Core/
          git add -f Samples/PolyPetDemoGodot/addons/PolyPet/ Samples/PolyPetDemoUnity/Packages/com.shilo.polypet/
          git diff --cached --quiet || git commit -m "chore(core): sync Core to engine adapters and samples"
          git push
