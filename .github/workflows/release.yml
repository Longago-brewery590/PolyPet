name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Bump version
        id: version
        run: |
          CURRENT=$(jq -r '.version' Unity/package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          if [ "$PATCH" -gt 9 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi
          if [ "$MINOR" -gt 9 ]; then
            MINOR=0
            MAJOR=$((MAJOR + 1))
          fi
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "VERSION=$NEW" >> $GITHUB_OUTPUT
          echo "TAG=v$NEW" >> $GITHUB_OUTPUT

          jq --arg v "$NEW" '.version = $v' Unity/package.json > tmp.json
          mv tmp.json Unity/package.json

          sed -i "s/^version=\".*\"/version=\"$NEW\"/" Godot/addons/PolyPet/plugin.cfg

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Unity/package.json Godot/addons/PolyPet/plugin.cfg
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.VERSION }}"
          git tag ${{ steps.version.outputs.TAG }}
          git push origin main --tags

      - name: Copy Core to Godot
        run: |
          rm -rf Godot/addons/PolyPet/Core
          mkdir -p Godot/addons/PolyPet/Core
          cp Core/*.cs Godot/addons/PolyPet/Core/

      - name: Copy Core to Unity
        run: |
          rm -rf Unity/Runtime/Core
          mkdir -p Unity/Runtime/Core
          cp Core/*.cs Unity/Runtime/Core/

      - name: Copy addon to Godot sample
        run: |
          rm -rf Samples/PolyPetDemoGodot/addons/PolyPet
          mkdir -p Samples/PolyPetDemoGodot/addons
          cp -r Godot/addons/PolyPet Samples/PolyPetDemoGodot/addons/PolyPet

      - name: Copy package to Unity sample
        run: |
          rm -rf Samples/PolyPetDemoUnity/Packages/com.shilo.polypet
          mkdir -p Samples/PolyPetDemoUnity/Packages
          cp -r Unity Samples/PolyPetDemoUnity/Packages/com.shilo.polypet

      - name: Zip Godot addon
        run: |
          cd Godot
          mkdir -p ../dist/addons
          cp -r addons/PolyPet ../dist/addons/PolyPet
          cd ../dist
          zip -r ../PolyPet-Godot-${{ steps.version.outputs.VERSION }}.zip addons/
          rm -rf ../dist

      - name: Zip Unity package
        run: |
          cd Unity
          zip -r ../PolyPet-Unity-${{ steps.version.outputs.VERSION }}.zip .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.version.outputs.TAG }} \
            --title "PolyPet ${{ steps.version.outputs.VERSION }}" \
            --generate-notes \
            PolyPet-Godot-${{ steps.version.outputs.VERSION }}.zip \
            PolyPet-Unity-${{ steps.version.outputs.VERSION }}.zip
