name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: polypet-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Refresh release base
        run: |
          git fetch origin main
          git pull --ff-only origin main
          echo "RELEASE_BASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Sync Core to engine adapters
        run: bash ./scripts/sync-core-to-adapters.sh

      - name: Bump version
        id: version
        run: |
          CURRENT=$(jq -r '.version' Unity/package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          if [ "$PATCH" -gt 9 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi
          if [ "$MINOR" -gt 9 ]; then
            MINOR=0
            MAJOR=$((MAJOR + 1))
          fi
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "VERSION=$NEW" >> "$GITHUB_OUTPUT"
          echo "TAG=v$NEW" >> "$GITHUB_OUTPUT"

          jq --arg v "$NEW" '.version = $v' Unity/package.json > tmp.json
          mv tmp.json Unity/package.json

          sed -i "s/^version=\".*\"/version=\"$NEW\"/" Godot/addons/PolyPet/plugin.cfg

      - name: Sync sample projects from release-ready engine sources
        run: |
          bash ./scripts/sync-godot-sample.sh
          bash ./scripts/sync-unity-sample.sh

      - name: Verify release-ready state
        shell: pwsh
        run: ./scripts/verify.ps1 -NoPause

      - name: Commit fully synced release state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Godot/addons/PolyPet/Core/ Unity/Runtime/Core/
          git add Godot/addons/PolyPet/plugin.cfg Unity/package.json
          git add -f Samples/PolyPetDemoGodot/addons/PolyPet/ Samples/PolyPetDemoUnity/Packages/com.shilo.polypet/
          git commit -m "chore(release): prepare ${{ steps.version.outputs.VERSION }}"

      - name: Push release commit to main
        run: |
          git fetch origin main
          if [ "$(git rev-parse origin/main)" != "$RELEASE_BASE_SHA" ]; then
            echo "::error::origin/main advanced during release preparation; rerun release."
            exit 1
          fi
          git push origin HEAD:main

      - name: Tag the pushed release commit
        run: |
          RELEASE_SHA="$(git rev-parse HEAD)"
          git tag "${{ steps.version.outputs.TAG }}" "$RELEASE_SHA"
          git push origin "${{ steps.version.outputs.TAG }}"

      - name: Zip Godot addon
        run: |
          cd Godot
          mkdir -p ../dist/addons
          cp -r addons/PolyPet ../dist/addons/PolyPet
          cd ../dist
          zip -r ../PolyPet-Godot-${{ steps.version.outputs.VERSION }}.zip addons/
          rm -rf ../dist

      - name: Zip Unity package
        run: |
          cd Unity
          zip -r ../PolyPet-Unity-${{ steps.version.outputs.VERSION }}.zip .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.version.outputs.TAG }} \
            --title "PolyPet ${{ steps.version.outputs.VERSION }}" \
            --generate-notes \
            PolyPet-Godot-${{ steps.version.outputs.VERSION }}.zip \
            PolyPet-Unity-${{ steps.version.outputs.VERSION }}.zip
